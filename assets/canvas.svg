    <text x="632" y="280" fill="#94a3b8" font-size="9">CONTAINER PORT BINDINGS:</text>
    <text x="632" y="295" fill="#ffffff" font-size="10" font-family="monospace" font-weight="bold">Port 3000 (Forward Proxy)</text>
    
